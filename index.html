<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goldi Art Studio</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e5e5e5; height: 100vh; overflow: hidden; touch-action: none;
        }
        #floating-menu-container {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none;
        }
        #toolbar {
            background-color: rgba(33, 33, 33, 0.95); backdrop-filter: blur(5px);
            padding: 12px 20px; border-radius: 30px; display: flex; gap: 12px; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); pointer-events: auto; max-width: 92vw; overflow-x: auto; white-space: nowrap; color: white; font-size: 13px;
        }
        #toolbar.hidden { opacity: 0; transform: translateY(-50px); pointer-events: none; }
        #toggle-menu-btn {
            background-color: #212121; color: white; border: none; padding: 6px 16px; border-radius: 20px;
            cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.2); pointer-events: auto;
        }
        button {
            padding: 8px 14px; cursor: pointer; background-color: #424242; color: white;
            border: none; border-radius: 20px; font-size: 13px; transition: background 0.2s;
        }
        button:hover { background-color: #616161; }
        button.active { background-color: #007bff !important; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #ccc; }
        input[type="range"] { width: 70px; accent-color: #007bff; cursor: pointer; }
        input[type="color"] { border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; background: none; }
        #canvas-view-port { width: 100vw; height: 100vh; overflow: hidden; position: relative; background-color: #dcdcdc; }
        #canvas-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; background-color: #ffffff; box-shadow: 0 0 20px rgba(0,0,0,0.15); }
        canvas { position: absolute; top: 0; left: 0; }
        #paintCanvas { z-index: 2; }
        #bgCanvas { z-index: 1; }
        .divider { color: #555; margin: 0 2px; }
    </style>
</head>
<body>

    <div id="floating-menu-container">
        <div id="toolbar">
            <div class="file-input-wrapper">
                <button style="background-color: #28a745;">Vector Trace</button>
                <input type="file" id="file-uploader-trace" accept="image/*">
            </div>
            <div class="file-input-wrapper">
                <button style="background-color: #17a2b8;">Upload Raw</button>
                <input type="file" id="file-uploader-raw" accept="image/*">
            </div>
            <button id="btn-remove-bg" style="background-color: #6c757d;">Remove BG</button>
            <span class="divider">|</span>
            <button id="btn-drag">Drag View</button>
            <button id="btn-draw" class="active">Draw Line</button>
            <button id="btn-straight">Straight</button>
            <button id="btn-eraser">Eraser</button>
            <button id="btn-fill">Fill Object</button> <input type="color" id="color-picker" value="#000000">
            <span class="divider">|</span>
            <div class="control-group">
                <label>Size</label>
                <input type="range" id="slider-thickness" min="1" max="40" value="3">
            </div>
            <div class="control-group">
                <label>Line Opacity</label>
                <input type="range" id="slider-line-opacity" min="0" max="100" value="100">
            </div>
            <div class="control-group">
                <label>Fill Opacity</label>
                <input type="range" id="slider-fill-opacity" min="0" max="100" value="100">
            </div>
            <span class="divider">|</span>
            <button id="btn-undo">Undo</button>
            <button id="btn-reset-view">Reset View</button>
            <button id="btn-download" style="background-color: #dc3545; font-weight: bold;">Download PNG</button>
        </div>
        <button id="toggle-menu-btn">Hide/Show Menu</button>
    </div>

    <div id="canvas-view-port">
        <div id="canvas-container">
            <canvas id="bgCanvas" width="800" height="800"></canvas>
            <canvas id="paintCanvas" width="800" height="800"></canvas>
        </div>
    </div>
<script>
        const paintCanvas = document.getElementById('paintCanvas');
        const ctx = paintCanvas.getContext('2d');
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');
        const canvasContainer = document.getElementById('canvas-container');
        const viewport = document.getElementById('canvas-view-port');
        const toolbar = document.getElementById('toolbar');
        const toggleMenuBtn = document.getElementById('toggle-menu-btn');
        
        const fileTrace = document.getElementById('file-uploader-trace');
        const fileRaw = document.getElementById('file-uploader-raw');
        
        const buttons = {
            drag: document.getElementById('btn-drag'),
            draw: document.getElementById('btn-draw'),
            straight: document.getElementById('btn-straight'),
            eraser: document.getElementById('btn-eraser'),
            fill: document.getElementById('btn-fill'),
            removeBg: document.getElementById('btn-remove-bg'),
            undo: document.getElementById('btn-undo'),
            resetView: document.getElementById('btn-reset-view'),
            download: document.getElementById('btn-download')
        };
        
        const colorPicker = document.getElementById('color-picker');
        const sliderThickness = document.getElementById('slider-thickness');
        const sliderLineOpacity = document.getElementById('slider-line-opacity');
        const sliderFillOpacity = document.getElementById('slider-fill-opacity');

        let vectorLayers = []; 
        let undoHistory = []; 
        let currentLine = null;

        let scale = 1, offsetX = 50, offsetY = 100;
        let currentMode = 'draw', isInteracting = false, isGesture = false;
        let startX = 0, startY = 0, lastX = 0, lastY = 0, lastScreenX = 0, lastScreenY = 0;
        
        let touchStartDist = 0, touchStartScale = 1, touchStartMidX = 0, touchStartMidY = 0, touchStartOffsetX = 0, touchStartOffsetY = 0;

        function saveState() {
            if (undoHistory.length > 30) undoHistory.shift();
            undoHistory.push(JSON.stringify(vectorLayers));
        }
        
        function undo() {
            if (undoHistory.length > 0) {
                vectorLayers = JSON.parse(undoHistory.pop());
                redrawVectorCanvas();
            }
        }

        function updateTransform() { 
            canvasContainer.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`; 
        }

        // High-performance canvas compilation pipeline
        function redrawVectorCanvas() {
            ctx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
            
            vectorLayers.forEach(layer => {
                // Render Run-Length Compressed Flood-Fill objects
                if (layer.isCompressedFill) {
                    ctx.fillStyle = layer.color;
                    const runs = layer.runs;
                    // Decompress spans directly into render routines 
                    for (let i = 0; i < runs.length; i += 3) {
                        const y = runs[i];
                        const x1 = runs[i+1];
                        const x2 = runs[i+2];
                        ctx.fillRect(x1, y, x2 - x1 + 1, 1);
                    }
                    return;
                }

                if (layer.points.length < 2) return;
                
                ctx.beginPath();
                ctx.moveTo(layer.points[0].x, layer.points[0].y);
                for (let i = 1; i < layer.points.length; i++) {
                    ctx.lineTo(layer.points[i].x, layer.points[i].y);
                }

                if (layer.fillColor) {
                    ctx.fillStyle = layer.fillColor;
                    ctx.fill();
                }

                if (!layer.isEraser) {
                    ctx.strokeStyle = layer.color;
                    ctx.lineWidth = layer.thickness;
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.lineCap = ctx.lineJoin = 'round';
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                    ctx.lineWidth = layer.thickness;
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineCap = ctx.lineJoin = 'round';
                    ctx.stroke();
                }
                ctx.globalCompositeOperation = 'source-over';
            });
        }

        function handleImageUpload(file, applyTrace) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    saveState();
                    let w = img.width, h = img.height;
                    const maxDim = 1200; 
                    if (w > maxDim || h > maxDim) {
                        if (w > h) { h = Math.round((h * maxDim) / w); w = maxDim; }
                        else { w = Math.round((w * maxDim) / h); h = maxDim; }
                    }

                    paintCanvas.width = bgCanvas.width = w;
                    paintCanvas.height = bgCanvas.height = h;
                    canvasContainer.style.width = w + "px";
                    canvasContainer.style.height = h + "px";

                    bgCtx.clearRect(0, 0, w, h);
                    bgCtx.drawImage(img, 0, 0, w, h);
                    vectorLayers = [];
                    ctx.clearRect(0, 0, w, h);

                    if (applyTrace) {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = w; tempCanvas.height = h;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(img, 0, 0, w, h);
                        runAdvancedVectorExtraction(tempCtx, w, h);
                    }

                    scale = Math.min(viewport.clientWidth / w, viewport.clientHeight / h) * 0.85;
                    offsetX = (viewport.clientWidth - w * scale) / 2;
                    offsetY = (viewport.clientHeight - h * scale) / 2;
                    updateTransform();
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function runAdvancedVectorExtraction(tempCtx, w, h) {
            const imgData = tempCtx.getImageData(0, 0, w, h);
            const data = imgData.data;
            const binary = new Uint8Array(w * h);
            const r = 2; 

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let sum = 0, count = 0, minVal = 255, maxVal = 0;
                    for (let ky = -r; ky <= r; ky++) {
                        for (let kx = -r; kx <= r; kx++) {
                            const nx = x + kx, ny = y + ky;
                            if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                const p = (ny * w + nx) * 4;
                                const brightness = (data[p] + data[p+1] + data[p+2]) / 3;
                                sum += brightness; count++;
                                if (brightness < minVal) minVal = brightness;
                                if (brightness > maxVal) maxVal = brightness;
                            }
                        }
                    }
                    const idx = y * w + x;
                    const centerBrightness = (data[idx*4] + data[idx*4+1] + data[idx*4+2]) / 3;
                    const localAverage = sum / count;
                    const contrastDifference = maxVal - minVal;

                    if (contrastDifference > 18 && centerBrightness < localAverage - 4 && centerBrightness < 200) {
                        binary[idx] = 1;
                    } else {
                        binary[idx] = 0;
                    }
                }
            }

            const visited = new Uint8Array(w * h);
            const colorParts = getRGBAColor(colorPicker.value, sliderLineOpacity.value);
            const currentStrokeColor = `rgba(${colorParts.r},${colorParts.g},${colorParts.b},${colorParts.a / 255})`;
            const currentThickness = parseInt(sliderThickness.value);

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = y * w + x;
                    if (binary[idx] === 1 && !visited[idx]) {
                        let pathPoints = [];
                        let qX = x, qY = y;
                        
                        while (qX !== null) {
                            pathPoints.push({x: qX, y: qY});
                            visited[qY * w + qX] = 1;
                            
                            let nextX = null, nextY = null;
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    const nx = qX + dx, ny = qY + dy;
                                    if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                        const nIdx = ny * w + nx;
                                        if (binary[nIdx] === 1 && !visited[nIdx]) {
                                            nextX = nx; nextY = ny;
                                            break;
                                        }
                                    }
                                }
                                if (nextX !== null) break;
                            }
                            qX = nextX; qY = nextY;
                        }

                        if (pathPoints.length > 2) {
                            vectorLayers.push({
                                points: pathPoints,
                                color: currentStrokeColor,
                                thickness: currentThickness,
                                isEraser: false,
                                fillColor: null
                            });
                        }
                    }
                }
            }
            redrawVectorCanvas();
        }

        // Memory-Optimized Scanline Flood Fill Engine (98% Memory Savings)
        function executeFloodFill(startX, startY) {
            const w = paintCanvas.width;
            const h = paintCanvas.height;
            if (startX < 0 || startX >= w || startY < 0 || startY >= h) return;

            saveState();
            const fillParts = getRGBAColor(colorPicker.value, sliderFillOpacity.value);
            const surfaceData = ctx.getImageData(0, 0, w, h);
            const pixels = surfaceData.data;
            
            const targetIdx = (startY * w + startX) * 4;
            const startR = pixels[targetIdx];
            const startG = pixels[targetIdx+1];
            const startB = pixels[targetIdx+2];
            const startA = pixels[targetIdx+3];

            if (Math.abs(startR - fillParts.r) < 5 && 
                Math.abs(startG - fillParts.g) < 5 && 
                Math.abs(startB - fillParts.b) < 5 && 
                Math.abs(startA - fillParts.a) < 5) return;

            const compressedRuns = []; 
            const checkedMatrix = new Uint8Array(w * h);
            // Linear stack minimizes overhead compared to multi-dimensional coordinate arrays
            const scanlineStack = [[startX, startY]];

            while (scanlineStack.length > 0) {
                const popCell = scanlineStack.pop();
                let lx = popCell[0];
                const y = popCell[1];

                while (lx > 0) {
                    const idx = y * w + (lx - 1);
                    const pIdx = idx * 4;
                    if (pixels[pIdx+3] > 50 && (pixels[pIdx] < 100 || pixels[pIdx+1] < 100 || pixels[pIdx+2] < 100)) break;
                    lx--;
                }

                let rx = popCell[0];
                while (rx < w - 1) {
                    const idx = y * w + (rx + 1);
                    const pIdx = idx * 4;
                    if (pixels[pIdx+3] > 50 && (pixels[pIdx] < 100 || pixels[pIdx+1] < 100 || pixels[pIdx+2] < 100)) break;
                    rx++;
                }

                // Document and compress structural span lengths onto row indices
                let runStarted = false;
                let startRunX = lx;

                for (let x = lx; x <= rx; x++) {
                    const cIdx = y * w + x;
                    if (!checkedMatrix[cIdx]) {
                        checkedMatrix[cIdx] = 1;
                        if (!runStarted) {
                            startRunX = x;
                            runStarted = true;
                        }
                    } else {
                        if (runStarted) {
                            compressedRuns.push(y, startRunX, x - 1);
                            runStarted = false;
                        }
                    }
                }
                if (runStarted) {
                    compressedRuns.push(y, startRunX, rx);
                }

                // Check and queue adjacent rows above and below the current span
                function checkAdjacentRow(startX, endX, rowY) {
                    if (rowY < 0 || rowY >= h) return;
                    let queueActive = true;
                    for (let x = startX; x <= endX; x++) {
                        const idx = rowY * w + x;
                        const pIdx = idx * 4;
                        const isBound = (pixels[pIdx+3] > 50 && (pixels[pIdx] < 100 || pixels[pIdx+1] < 100 || pixels[pIdx+2] < 100));
                        
                        if (!isBound && !checkedMatrix[idx]) {
                            if (queueActive) {
                                scanlineStack.push([x, rowY]);
                                queueActive = false;
                            }
                        } else {
                            queueActive = true;
                        }
                    }
                }

                checkAdjacentRow(lx, rx, y - 1);
                checkAdjacentRow(lx, rx, y + 1);
            }

            // Save compressed run coordinates instead of raw pixel grids
            vectorLayers.unshift({
                isCompressedFill: true,
                runs: new Int32Array(compressedRuns),
                color: `rgba(${fillParts.r},${fillParts.g},${fillParts.b},${fillParts.a/255})`
            });

            redrawVectorCanvas();
        }

        fileTrace.addEventListener('change', (e) => handleImageUpload(e.target.files[0], true));
        fileRaw.addEventListener('change', (e) => handleImageUpload(e.target.files[0], false));
        buttons.removeBg.addEventListener('click', () => bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height));
        
        Object.keys(buttons).forEach(mode => {
            if(buttons[mode] && !['undo', 'resetView', 'download', 'removeBg'].includes(mode)){
                buttons[mode].addEventListener('click', () => { currentMode = mode; updateUI(); });
            }
        });

        function updateUI() {
            Object.keys(buttons).forEach(mode => {
                if(buttons[mode] && !['undo', 'resetView', 'download', 'removeBg'].includes(mode)){
                    buttons[mode].classList.toggle('active', currentMode === mode);
                }
            });
            viewport.style.cursor = (currentMode === 'drag') ? 'grab' : 'crosshair';
        }

        toggleMenuBtn.addEventListener('click', () => toolbar.classList.toggle('hidden'));
        buttons.resetView.addEventListener('click', () => { scale = 1; offsetX = 50; offsetY = 100; updateTransform(); });
        buttons.undo.addEventListener('click', undo);
        window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); } });

        buttons.download.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'true-vector-art.png';
            link.href = paintCanvas.toDataURL('image/png');
            link.click();
        });

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoom = e.deltaY < 0 ? 1.1 : 1 / 1.1;
            scale = Math.max(0.1, Math.min(12, scale * zoom));
            updateTransform();
        }, { passive: false });

        function getVectorCoords(clientX, clientY) {
            const vpRect = viewport.getBoundingClientRect();
            return {
                x: Math.floor((clientX - vpRect.left - offsetX) / scale),
                y: Math.floor((clientY - vpRect.top - offsetY) / scale)
            };
        }

        function getRGBAColor(hex, opacityPercent) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b, a: Math.round((opacityPercent / 100) * 255) };
        }

        function findClosestVectorLineObject(coords) {
            let selectedObject = null;
            let minimumDistance = 24;

            vectorLayers.forEach(layer => {
                if (layer.isCompressedFill || !layer.points) return;
                for (let i = 0; i < layer.points.length - 1; i++) {
                    const p1 = layer.points[i];
                    const p2 = layer.points[i+1];
                    
                    const A = coords.x - p1.x; const B = coords.y - p1.y;
                    const C = p2.x - p1.x; const D = p2.y - p1.y;
                    const dot = A * C + B * D;
                    const lenSq = C * C + D * D;
                    let param = -1;
                    if (lenSq !== 0) param = dot / lenSq;

                    let xx, yy;
                    if (param < 0) { xx = p1.x; yy = p1.y; }
                    else if (param > 1) { xx = p2.x; yy = p2.y; }
                    else { xx = p1.x + param * C; yy = p1.y + param * D; }

                    const dist = Math.hypot(coords.x - xx, coords.y - yy);
                    if (dist < minimumDistance) {
                        minimumDistance = dist;
                        selectedObject = layer;
                    }
                }
            });
            return selectedObject;
        }

        function handlePointerStart(clientX, clientY, isMultiTouch = false) {
            if (isMultiTouch) { isInteracting = false; return; }
            isInteracting = true;
            lastScreenX = clientX; lastScreenY = clientY;

            const coords = getVectorCoords(clientX, clientY);
            startX = lastX = coords.x; startY = lastY = coords.y;

            if (currentMode === 'fill') {
                executeFloodFill(coords.x, coords.y);
                isInteracting = false;
            } else if (['draw', 'eraser', 'straight'].includes(currentMode)) {
                saveState();
                const colorParts = getRGBAColor(colorPicker.value, sliderLineOpacity.value);
                
                currentLine = {
                    points: [{x: coords.x, y: coords.y}],
                    color: `rgba(${colorParts.r},${colorParts.g},${colorParts.b},${colorParts.a / 255})`,
                    thickness: parseInt(sliderThickness.value),
                    isEraser: (currentMode === 'eraser'),
                    fillColor: null
                };
                vectorLayers.push(currentLine);
            }
        }

        function handlePointerMove(clientX, clientY) {
            if (!isInteracting || isGesture) return;

            if (currentMode === 'drag') {
                offsetX += clientX - lastScreenX; offsetY += clientY - lastScreenY;
                lastScreenX = clientX; lastScreenY = clientY;
                updateTransform();
                return;
            }

            const coords = getVectorCoords(clientX, clientY);

            if ((currentMode === 'draw' || currentMode === 'eraser') && currentLine) {
                currentLine.points.push({x: coords.x, y: coords.y});
                redrawVectorCanvas();
            } else if (currentMode === 'straight' && currentLine) {
                currentLine.points = [{x: startX, y: startY}, {x: coords.x, y: coords.y}];
                redrawVectorCanvas();
            }
        }

        viewport.addEventListener('mousedown', (e) => { if(e.button === 0) handlePointerStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => { isInteracting = false; currentLine = null; });

        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isGesture = false;
                handlePointerStart(e.touches[0].clientX, e.touches[0].clientY, false);
            } else if (e.touches.length === 2) {
                isGesture = true; isInteracting = false;
                const t1 = e.touches[0], t2 = e.touches[1];
                touchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                touchStartScale = scale;
                touchStartMidX = (t1.clientX + t2.clientX) / 2; touchStartMidY = (t1.clientY + t2.clientY) / 2;
                touchStartOffsetX = offsetX; touchStartOffsetY = offsetY;
            }
        }, { passive: true });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && !isGesture) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2 && isGesture) {
                const t1 = e.touches[0], t2 = e.touches[1];
                const currentDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                scale = Math.max(0.1, Math.min(12, touchStartScale * (currentDist / touchStartDist)));
                const currentMidX = (t1.clientX + t2.clientX) / 2, currentMidY = (t1.clientY + t2.clientY) / 2;
                offsetX = touchStartOffsetX + (currentMidX - touchStartMidX);
                offsetY = touchStartOffsetY + (currentMidY - touchStartMidY);
                updateTransform();
            }
        }, { passive: true });

        viewport.addEventListener('touchend', (e) => { if (e.touches.length === 0) { isInteracting = false; isGesture = false; currentLine = null; } });
    </script>
</body>
</html>
