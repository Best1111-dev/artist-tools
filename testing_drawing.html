<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Line Art & Color Studio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #e5e5e5;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Block default browser scrolling/pinching */
        }

        #floating-menu-container {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            pointer-events: none;
        }

        #toolbar {
            background-color: rgba(33, 33, 33, 0.95);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            border-radius: 30px;
            display: flex;
            gap: 8px;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            pointer-events: auto;
            transition: all 0.3s ease;
            max-width: 90vw;
            overflow-x: auto;
            white-space: nowrap;
        }

        #toolbar.hidden {
            opacity: 0;
            transform: translateY(-50px);
            pointer-events: none;
        }

        #toggle-menu-btn {
            background-color: #212121;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            pointer-events: auto;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
            background-color: #424242;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            transition: background 0.2s;
        }

        button:hover { background-color: #616161; }
        button.active { background-color: #007bff !important; }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            cursor: pointer; height: 100%; width: 100%;
        }

        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        #canvas-view-port {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-color: #dcdcdc;
        }

        canvas {
            /* The canvas is transparent, but we give it a white CSS background so it looks like paper */
            background-color: #ffffff; 
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: 0 0;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        
        .divider { color: #666; margin: 0 4px; }
    </style>
</head>
<body>

    <div id="floating-menu-container">
        <div id="toolbar">
            <div class="file-input-wrapper">
                <button style="background-color: #28a745;">Upload & Trace</button>
                <input type="file" id="file-uploader-trace" accept="image/*">
            </div>
            <div class="file-input-wrapper">
                <button style="background-color: #17a2b8;">Upload Raw</button>
                <input type="file" id="file-uploader-raw" accept="image/*">
            </div>
            <span class="divider">|</span>
            <button id="btn-drag">Drag View</button> <button id="btn-draw" class="active">Draw Line</button>
            <button id="btn-straight">Straight Line</button>
            <button id="btn-eraser">Eraser</button>
            <button id="btn-fill">Fill Bucket</button>
            <input type="color" id="color-picker" value="#ff2a2a">
            <span class="divider">|</span>
            <button id="btn-undo">Undo</button>
            <button id="btn-reset-view">Reset View</button>
            <button id="btn-download" style="background-color: #dc3545; font-weight: bold;">Download PNG</button> </div>
        <button id="toggle-menu-btn">Hide/Show Menu</button>
    </div>

    <div id="canvas-view-port">
        <canvas id="paintCanvas" width="1000" height="1000"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const viewport = document.getElementById('canvas-view-port');
        const toolbar = document.getElementById('toolbar');
        const toggleMenuBtn = document.getElementById('toggle-menu-btn');
        const fileTrace = document.getElementById('file-uploader-trace');
        const fileRaw = document.getElementById('file-uploader-raw');

        const buttons = {
            drag: document.getElementById('btn-drag'),
            draw: document.getElementById('btn-draw'),
            straight: document.getElementById('btn-straight'),
            eraser: document.getElementById('btn-eraser'),
            fill: document.getElementById('btn-fill'),
            undo: document.getElementById('btn-undo'),
            resetView: document.getElementById('btn-reset-view'),
            download: document.getElementById('btn-download')
        };
        const colorPicker = document.getElementById('color-picker');

        // Transform States (Zoom & Pan Matrix)
        let scale = 1;
        let offsetX = 50;
        let offsetY = 100;

        // Interaction States
        let currentMode = 'draw'; 
        let isInteracting = false; 
        let isGesture = false; 
        let startX = 0, startY = 0;
        let lastX = 0, lastY = 0;
        let lastScreenX = 0, lastScreenY = 0; // Track raw screen positions for Panning/Dragging tool
        let lineSnapshot = null;

        // Mobile Gesture State Tracking
        let touchStartDist = 0;
        let touchStartScale = 1;
        let touchStartMidX = 0, touchStartMidY = 0;
        let touchStartOffsetX = 0, touchStartOffsetY = 0;
        
        // Undo Setup
        let undoStack = [];
        const maxUndoDepth = 20;

        function saveState() {
            if (undoStack.length >= maxUndoDepth) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (undoStack.length > 0) ctx.putImageData(undoStack.pop(), 0, 0);
        }

        function updateCanvasTransform() {
            canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
        }

        function initCanvas() {
            // Leave the canvas background blank/transparent natively!
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            undoStack = [];
            updateCanvasTransform();
        }
        initCanvas();

        // Image Loader Engine
        function handleImageUpload(file, applyTraceFilter) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    saveState();
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);

                    if (applyTraceFilter) {
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            const brightness = 0.34 * data[i] + 0.5 * data[i+1] + 0.16 * data[i+2];
                            // Tracing adjustment: Turn dark pixels to solid black lines, light pixels to transparent window
                            if (brightness < 140) {
                                data[i] = data[i+1] = data[i+2] = 0; // Black lines
                                data[i+3] = 255; // Opaque
                            } else {
                                data[i] = data[i+1] = data[i+2] = 255;
                                data[i+3] = 0; // Transparent background
                            }
                        }
                        ctx.putImageData(imgData, 0, 0);
                    }
                    
                    // Auto-fit view
                    scale = Math.min(viewport.clientWidth / canvas.width, viewport.clientHeight / canvas.height) * 0.9;
                    offsetX = (viewport.clientWidth - canvas.width * scale) / 2;
                    offsetY = (viewport.clientHeight - canvas.height * scale) / 2;
                    updateCanvasTransform();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        }

        fileTrace.addEventListener('change', (e) => handleImageUpload(e.target.files[0], true));
        fileRaw.addEventListener('change', (e) => handleImageUpload(e.target.files[0], false));

        // Setup Toolbar Click Listeners
        Object.keys(buttons).forEach(mode => {
            if(buttons[mode] && !['undo', 'resetView', 'download'].includes(mode)){
                buttons[mode].addEventListener('click', () => { currentMode = mode; updateUI(); });
            }
        });

        function updateUI() {
            Object.keys(buttons).forEach(mode => {
                if(buttons[mode] && !['undo', 'resetView', 'download'].includes(mode)){
                    buttons[mode].classList.toggle('active', currentMode === mode);
                }
            });
            // Update cursor look for clarity
            viewport.style.cursor = (currentMode === 'drag') ? 'grab' : 'crosshair';
        }

        toggleMenuBtn.addEventListener('click', () => toolbar.classList.toggle('hidden'));
        buttons.resetView.addEventListener('click', () => { scale = 1; offsetX = 50; offsetY = 100; updateCanvasTransform(); });
        buttons.undo.addEventListener('click', undo);
        window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); } });

        // New Feature: Download PNG (Without Background)
        buttons.download.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'transparent-art.png';
            // Because our canvas background is natively transparent, this method automatically excludes the white CSS paper backing
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // PC Mouse Wheel Zoom Support
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.1;
            if (e.deltaY < 0) {
                scale = Math.min(10, scale * zoomFactor);
            } else {
                scale = Math.max(0.15, scale / zoomFactor);
            }
            updateCanvasTransform();
        }, { passive: false });

        // Translate Screen Positions into accurate scaled Drawing Coordinates
        function getVectorCoords(clientX, clientY) {
            const vpRect = viewport.getBoundingClientRect();
            const x = (clientX - vpRect.left - offsetX) / scale;
            const y = (clientY - vpRect.top - offsetY) / scale;
            return { x: Math.floor(x), y: Math.floor(y) };
        }

        // Universal Interaction Engine (Input Logic for Draw, Drag, Fill, Straight Line)
        function handlePointerStart(clientX, clientY, isMultiTouch = false) {
            if (isMultiTouch) {
                isInteracting = false; 
                return;
            }
            isInteracting = true;
            
            // Track raw screen positions specifically for the new Viewport Dragging Tool
            lastScreenX = clientX;
            lastScreenY = clientY;

            const coords = getVectorCoords(clientX, clientY);
            startX = lastX = coords.x;
            startY = lastY = coords.y;

            if (currentMode === 'fill') {
                saveState();
                floodFill8Way(coords.x, coords.y, colorPicker.value);
            } else if (currentMode === 'straight') {
                saveState();
                lineSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            } else if (['draw', 'eraser'].includes(currentMode)) {
                saveState();
            }
        }

        function handlePointerMove(clientX, clientY) {
            if (!isInteracting || isGesture) return;

            // New Feature Action: Drag Tool Viewport Manipulation
            if (currentMode === 'drag') {
                const deltaX = clientX - lastScreenX;
                const deltaY = clientY - lastScreenY;
                offsetX += deltaX;
                offsetY += deltaY;
                lastScreenX = clientX;
                lastScreenY = clientY;
                updateCanvasTransform();
                return;
            }

            const coords = getVectorCoords(clientX, clientY);

            if (currentMode === 'draw' || currentMode === 'eraser') {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(coords.x, coords.y);
                ctx.strokeStyle = (currentMode === 'eraser') ? 'rgba(0,0,0,0)' : '#000000';
                
                // Clear out areas natively when erasing using destination-out layout rules
                ctx.globalCompositeOperation = (currentMode === 'eraser') ? 'destination-out' : 'source-over';
                ctx.lineWidth = (currentMode === 'eraser') ? 30 : 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                // Reset blend modes back to normal
                ctx.globalCompositeOperation = 'source-over';
                
                lastX = coords.x;
                lastY = coords.y;
            } else if (currentMode === 'straight' && lineSnapshot) {
                ctx.putImageData(lineSnapshot, 0, 0);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(coords.x, coords.y);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        // Desktop Mouse Bindings
        viewport.addEventListener('mousedown', (e) => { if(e.button === 0) handlePointerStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => { isInteracting = false; lineSnapshot = null; });

        // Mobile Hand Gestures & Multi-Touch Bindings
        viewport.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isGesture = false;
                handlePointerStart(e.touches[0].clientX, e.touches[0].clientY, false);
            } else if (e.touches.length === 2) {
                isGesture = true;
                isInteracting = false;
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                touchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                touchStartScale = scale;
                touchStartMidX = (t1.clientX + t2.clientX) / 2;
                touchStartMidY = (t1.clientY + t2.clientY) / 2;
                touchStartOffsetX = offsetX;
                touchStartOffsetY = offsetY;
            }
        }, { passive: true });

        viewport.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && !isGesture) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2 && isGesture) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                
                const currentDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                scale = Math.max(0.15, Math.min(10, touchStartScale * (currentDist / touchStartDist)));

                const currentMidX = (t1.clientX + t2.clientX) / 2;
                const currentMidY = (t1.clientY + t2.clientY) / 2;
                offsetX = touchStartOffsetX + (currentMidX - touchStartMidX);
                offsetY = touchStartOffsetY + (currentMidY - touchStartMidY);

                updateCanvasTransform();
            }
        }, { passive: true });

        viewport.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isInteracting = false;
                isGesture = false;
                lineSnapshot = null;
            }
        });

        // 8-Way Connectivity Flood Fill Execution Engine (Now accounting for transparent RGBA spaces)
        function floodFill8Way(startX, startY, fillColorHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            const fillR = parseInt(fillColorHex.slice(1, 3), 16);
            const fillG = parseInt(fillColorHex.slice(3, 5), 16);
            const fillB = parseInt(fillColorHex.slice(5, 7), 16);
            const fillA = 255;

            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos], startG = data[startPos + 1], startB = data[startPos + 2], startA = data[startPos + 3];

            // Avoid infinite processing loop if target color matches chosen color
            if (Math.abs(startR - fillR) < 5 && Math.abs(startG - fillG) < 5 && Math.abs(startB - fillB) < 5 && Math.abs(startA - fillA) < 5) return;

            const queue = [startX, startY];

            while (queue.length > 0) {
                const curY = queue.pop();
                const curX = queue.pop();
                const pos = (curY * width + curX) * 4;

                if (data[pos] === startR && data[pos+1] === startG && data[pos+2] === startB && data[pos+3] === startA) {
                    data[pos] = fillR; data[pos+1] = fillG; data[pos+2] = fillB; data[pos+3] = fillA;

                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue;
                            const nx = curX + dx;
                            const ny = curY + dy;

                            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                                const nPos = (ny * width + nx) * 4;
                                if (data[nPos] === startR && data[nPos+1] === startG && data[nPos+2] === startB && data[nPos+3] === startA) {
                                    queue.push(nx, ny);
                                }
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }
    </script>
</body>
</html>
